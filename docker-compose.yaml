version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - API_KEY=dev-key-optional
      - DEPLOYMENT_ENV=local
    volumes:
      - ./backend/data:/app/data
    # GPU disabled - using CPU. Uncomment below if you have a supported GPU.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  frontend:
    build:
      context: ./frontend/stock_sentiment_analysis
      args:
        - REACT_APP_API_URL=http://localhost:8000
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
